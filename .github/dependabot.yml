# Dependabot configuration for multimap-kotlin.
#
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Covers three ecosystems present in this repo:
#
#   1. Gradle — kotlin-multiplatform plugin, kotlin-serialization plugin,
#      android-kotlin-multiplatform-library plugin, vanniktech maven-publish,
#      and the kotlinx-{coroutines,serialization,datetime,collections-immutable}
#      runtime dependencies declared in build.gradle.kts.
#
#   2. GitHub Actions — the actions pinned across the workflow files in
#      .github/workflows/. Versions are not enumerated here: Dependabot reads
#      them straight from the workflow files, and a hand-kept list in this
#      comment would silently drift from the actual pins.
#
#   3. npm — the kotlin-js-store directory is registered with
#      open-pull-requests-limit: 0 to prevent Dependabot from creating PRs for
#      vendored npm dependencies. These dependencies are workspace-template-managed
#      and updates land via the workspace template, not via Dependabot on this repo.

version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "gradle"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"

  # Explicitly register kotlin-js-store as an npm ecosystem with PR limit 0.
  # This prevents Dependabot from creating PRs for vendored dependencies that
  # are intentionally managed via the workspace template, not via Dependabot.
  # Setting open-pull-requests-limit to 0 disables both version and security
  # updates for this directory.
  - package-ecosystem: npm
    directory: "/kotlin-js-store"
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
